{% extends 'base.html' %}
{% block title %}Log in | JobRec{% endblock %}

{% block content %}

<style>
    /* Matches the startup dark hero header but with a softer feel */
    .auth-header {
        background-color: #1a1a1a;
        padding: 100px 20px 160px 20px;
        margin-top: -20px; /* Aligns with navbar */
        text-align: center;
        border-bottom-left-radius: 60px;
        border-bottom-right-radius: 60px;
    }

    .auth-header h2 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 42px;
        letter-spacing: -1.5px;
        background: linear-gradient(to right, #ff8a00, #da1b60);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Floating card logic */
    .overlap-card {
        margin-top: -100px;
        position: relative;
        z-index: 10;
    }

    .auth-card {
        background: #FFFFFF;
        border-radius: 35px !important;
        border: 1px solid rgba(255, 255, 255, 1) !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1) !important;
    }

    /* Clean Startup Inputs */
    .auth-input-group {
        position: relative;
        margin-bottom: 20px;
    }

    .auth-input {
        border-radius: 16px;
        padding: 16px 20px 16px 52px; /* Space for icon */
        border: 2px solid #f3f4f6;
        background-color: #f9fa/fb;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        transition: all 0.3s ease;
        width: 100%;
    }

    .auth-input:focus {
        background-color: #FFFFFF;
        border-color: #da1b60;
        box-shadow: 0 0 0 4px rgba(218, 27, 96, 0.1);
        outline: none;
    }

    .input-icon {
        position: absolute;
        top: 50%;
        left: 20px;
        transform: translateY(-50%);
        color: #9ca3af;
        transition: color 0.3s ease;
        z-index: 5;
    }

    .auth-input-group:focus-within .input-icon {
        color: #da1b60;
    }

    .form-label {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 10px;
        margin-left: 5px;
        font-size: 0.95rem;
    }

    /* The Pink Button */
    .btn-login-main {
        background: #da1b60;
        color: white !important;
        padding: 16px;
        border-radius: 100px;
        font-weight: 700;
        font-size: 1.1rem;
        border: none;
        box-shadow: 0 10px 20px rgba(218, 27, 96, 0.2);
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 20px;
    }

    .btn-login-main:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
        box-shadow: 0 15px 25px rgba(218, 27, 96, 0.35);
    }
</style>

<div class="auth-header">
    <div class="container">
        <h2>Welcome Back</h2>
        <p class="text-white-50 fs-6 mx-auto" style="max-width: 500px;">
            Log in to your JobRec account to manage your applications and see new matches.
        </p>
    </div>
</div>

<div class="container overlap-card mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Username Field -->
                        <div class="mb-4">
                            <label class="form-label">Username</label>
                            <div class="auth-input-group">
                                <span class="input-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                </span>
                                <input 
                                    type="text" 
                                    name="username" 
                                    class="auth-input"
                                    placeholder="yourname123"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="auth-input-group">
                                <span class="input-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                </span>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="auth-input"
                                    placeholder="••••••••"
                                    required
                                >
                            </div>
                        </div>

                        <button type="submit" class="btn-login-main">
                            Sign In to Discovery
                        </button>
                    </form>

                    <div class="text-center mt-5 pt-4 border-top">
                        <p class="text-muted mb-0">
                            New here? 
                            <a href="{% url 'register' %}" class="fw-bold ms-1" style="color: #da1b60; text-decoration: none;">
                                Create an account &rarr;
                            </a>
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
