{% extends 'base.html' %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
}

.card {
    border-radius: 15px;
}

.form-control {
    border-radius: 10px;
}

.btn-custom {
    border-radius: 25px;
    padding: 8px 25px;
}
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-lg p-4">

```
            <h3 class="text-center text-primary mb-4">
                Update Profile
            </h3>

            <form method="POST">
                {% csrf_token %}

                {% if request.user.user_type == 'jobseeker' %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Skills</label>
                        <input type="text" class="form-control" name="skills" value="{{ profile.skills }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Experience (Years)</label>
                        <input type="number" class="form-control" name="experience_years" value="{{ profile.experience_years }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Preferred Location</label>
                        <input type="text" class="form-control" name="preferred_location" value="{{ profile.preferred_location }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Job Type</label>
                        <input type="text" class="form-control" name="preferred_job_type" value="{{ profile.preferred_job_type }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Education</label>
                        <input type="text" class="form-control" name="education" value="{{ profile.education }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Role</label>
                        <input type="text" class="form-control" name="role" value="{{ profile.role }}">
                    </div>

                </div>

                {% elif request.user.user_type == 'recruiter' %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control" name="company_name" value="{{ company.name }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Website</label>
                        <input type="text" class="form-control" name="company_website" value="{{ company.website }}">
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" name="company_description">{{ company.description }}</textarea>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Industry</label>
                        <input type="text" class="form-control" name="industry" value="{{ company.industry }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Company Size</label>
                        <input type="text" class="form-control" name="company_size" value="{{ company.company_size }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" value="{{ company.location }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Founded Year</label>
                        <input type="number" class="form-control" name="founded_year" value="{{ company.founded_year }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Role</label>
                        <input type="text" class="form-control" name="role" value="{{ company.role }}">
                    </div>

                </div>

                {% endif %}

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-custom">
                        Update Profile
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
```

</div>

{% endblock %}
